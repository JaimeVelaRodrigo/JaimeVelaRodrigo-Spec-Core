meta:
  name: "Spec-Core"
  version: "2.0.0-draft"
  status: "draft"
  last_updated: "2026-04-23"
  owner: "Jaime Vela Rodrigo"
  languages: ["en", "es"]
  primary_language: "en"
  repository_role: "constitution"
  description: >
    Core identity and invariant specification. Defines the foundational
    principles, values, and operating logic that govern all other specs.
  active: true
  
pillars:
  renaissance: "specs/renaissance/current/spec.yaml"
  professional: "specs/professional/current/spec.yaml"
  foresight:   "specs/foresight/current/spec.yaml"

identity:
  essence: >
    I operate at the intersection of infrastructure, finance, technology
    and human development. I integrate aesthetic perception, ethical
    responsibility and systemic thinking with practical discipline to
    transform complexity into coherent, actionable and value-generating structures.

  identity_signature:
    description: >
      A system integrator with philosophical depth and operational grounding,
      oriented toward sustained value creation under conditions of uncertainty.

  core_orientation:
    - long-term value creation over short-term optimization
    - integration over fragmentation
    - coherence over speed
    - awareness over automatic behavior

  problem_space:
    description: >
      Navigating structural transitions in energy, infrastructure and technology
      systems under conditions of uncertainty, financial pressure and paradigm shift.

  contribution_mode:
    description: >
      I enable clarity, alignment and decision-making in complex environments,
      helping transform constrained or fragmented systems into coherent and
      viable structures.

  values: [Beauty, Harmony, Responsibility, Integrity, Stewardship]

  generative_axis:
    sustained_value_creation:
      definition: >
        Create value that is economically viable, ethically grounded,
        aesthetically coherent and structurally sustainable over time.
      purpose: >
        Sustained value creation is the enabling condition for continuity,
        freedom, contribution and long-term impact.
        Value is not only financial or structural, but also experiential:
        it must support a life that is coherent, meaningful and fully lived.
      constraints:
        - must be cash-flow aware
        - must not degrade human or environmental systems
        - must be scalable without loss of integrity

  principles:
    - Prefer clarity and elegance over unnecessary complexity.
    - Every reflection must translate into 3 verifiable actions (≤7 days).
    - Align value across investors, communities and environment (shared gain).
    - Anchor all strategy in unit economics and real cash-flow dynamics.
    - Prioritize stewardship over short-term extraction.
    - Evaluate all decisions through sustained value creation.

offers:
  - name: "Executive Foresight Session"
    format: "90-minute advisory session"
    promise: >
      Translate uncertainty into a board-ready decision map integrating
      strategic foresight, financial discipline and systemic risk awareness.
    value_created:
      - clearer decision framing
      - identification of hidden risks and structural constraints
      - alignment between strategic ambition and financial reality
    best_for:
      - founders
      - boards
      - investors
      - infrastructure and energy leaders
    call_to_action: "Schedule an introductory session."

  - name: "Infrastructure & Energy Advisory"
    format: "project-based advisory"
    promise: >
      Support the design, assessment and repositioning of infrastructure
      and energy opportunities through bankable framing, unit economics,
      risk allocation, governance and sustainability criteria.
    value_created:
      - stronger investment narratives
      - more realistic capital structures
      - improved stakeholder alignment
      - long-term value protection
    best_for:
      - project sponsors
      - investors
      - developers
      - family offices
      - strategic partners
    call_to_action: "Request a 1-page opportunity memo."

contexts:
  geography:
    base: "Chile"
    relevance: >
      Chile operates as a real-world testing ground for energy transition,
      infrastructure development and capital constraints under volatility.
    constraints:
      - limited access to long-term capital
      - regulatory and political uncertainty
      - technological disruption in energy markets
    opportunity:
      - redesign of infrastructure and energy models
      - integration of sustainability with financial viability
      - new frameworks for value creation under constraint

  sectors:
    primary:
      - energy
      - infrastructure
    adjacent:
      - finance
      - AI / AGI (ethics and implications)
      - sustainability

  operating_conditions:
    description: >
      Work is conducted under conditions of uncertainty, financial pressure
      and structural transition, requiring clarity, discipline and
      long-term orientation.

  value_context:
    description: >
      Value must be created under real constraints and must remain viable
      across time, stakeholders and systems.

workflows:
  vca_repo_path: "vca/VCA.md"
  response_rule: "Always end with Action: 3 verifiable steps ≤ 7 days."
  files_order_for_ai:
    - "core/spec-core.yaml"
    - "<active pillar yaml>"

integration_guidance:
  how_to_prompt_ai: |
    Read core/spec-core.yaml first (identity, values, principles,
    generative_axis, offers and contexts), then the active pillar Spec YAML.

    Do not reduce complexity prematurely.
    Preserve ambiguity when necessary.
    Integrate financial, ethical, aesthetic and systemic perspectives.

    If information is missing, ask to complete the relevant YAML field.

    Always end with:
    Action:
    - 3 verifiable steps
    - executable within ≤7 days
    - aligned with sustained value creation

  ai_intent: >
    This spec is designed as a grounding layer for AI systems to interpret
    identity, decision-making logic and value creation criteria.
    
ontology:
  schema_org:
    person: "https://schema.org/Person"
    offer:  "https://schema.org/Offer"
  foaf:
    person: "http://xmlns.com/foaf/0.1/Person"
  rdf_types:
    - "schema:Person"
  field_mappings:
    name: "schema:name"
    values: "schema:values"
    offers: "schema:makesOffer"
